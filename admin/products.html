<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — Reschevie Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-logo">
      <a href="../index.html" class="logo"><span class="logo-r">R</span>eschevie</a>
      <span>Admin Panel</span>
    </div>
    <nav class="admin-nav">
      <a href="index.html" class="admin-nav-item"><span class="admin-nav-icon">📊</span> Dashboard</a>
      <a href="products.html" class="admin-nav-item active"><span class="admin-nav-icon">💍</span> Products</a>
      <a href="inquiries.html" class="admin-nav-item"><span class="admin-nav-icon">📩</span> Inquiries</a>
      <a href="users.html" class="admin-nav-item"><span class="admin-nav-icon">👤</span> Users</a>
      <a href="stories.html" class="admin-nav-item"><span class="admin-nav-icon">💬</span> Client Stories</a>
      <a href="newsletters.html" class="admin-nav-item"><span class="admin-nav-icon">✉️</span> Newsletters</a>
      <div style="height:1px; background:rgba(197,160,112,0.1); margin:16px 0;"></div>
      <a href="../index.html" class="admin-nav-item"><span class="admin-nav-icon">🌐</span> View Site</a>
      <a href="#" class="admin-nav-item" id="logout-btn"><span class="admin-nav-icon">🚪</span> Sign Out</a>
    </nav>
  </aside>

  <main class="admin-main">
    <div class="admin-header">
      <h1>Products</h1>
      <button class="btn-gold" id="add-product-btn">+ Add Product</button>
    </div>

    <!-- Search -->
    <div style="margin-bottom:20px;">
      <div class="search-bar">
        <input type="text" class="search-input" id="product-search" placeholder="Search products...">
        <button class="search-btn">🔍</button>
      </div>
    </div>

    <div class="admin-table-wrap">
      <div class="admin-table-header">
        <h3>All Products <span id="product-count" style="font-size:14px; color:var(--gray-light); font-family:var(--font-sans);"></span></h3>
      </div>
      <table>
        <thead><tr>
          <th>Product</th><th>Type</th><th>Origin</th><th>Karat</th><th>Price</th><th>Status</th><th>Actions</th>
        </tr></thead>
        <tbody id="products-table"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Product Form Modal -->
<div class="admin-modal-overlay" id="product-form-modal">
  <div class="admin-modal">
    <button class="modal-close" id="modal-close-btn">✕</button>
    <h2 id="modal-title">Add Product</h2>
    <input type="hidden" id="edit-id">
    <div class="form-group">
      <label class="form-label">Product Name *</label>
      <input type="text" id="p-name" class="form-input" placeholder="e.g. Serpent Bohème Necklace">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Type *</label>
        <select id="p-type" class="form-input">
          <option value="ring">Ring</option>
          <option value="necklace">Necklace</option>
          <option value="earring">Earring</option>
          <option value="bracelet">Bracelet</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Origin *</label>
        <select id="p-origin" class="form-input">
          <option value="Japan">Japan</option>
          <option value="Italy">Italy</option>
          <option value="Saudi Arabia">Saudi Arabia</option>
          <option value="Hong Kong">Hong Kong</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Karat</label>
        <input type="text" id="p-karat" class="form-input" placeholder="e.g. 18K">
      </div>
      <div class="form-group">
        <label class="form-label">Weight</label>
        <input type="text" id="p-weight" class="form-input" placeholder="e.g. 12.4g">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Materials</label>
      <input type="text" id="p-materials" class="form-input" placeholder="e.g. 18K Yellow Gold, VS1 Diamond">
    </div>
    <div class="form-group">
      <label class="form-label">Price (use "POA" for Price Upon Request)</label>
      <input type="text" id="p-price" class="form-input" placeholder="e.g. ₱ 85,000 or POA">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea id="p-description" class="form-input" rows="3" placeholder="Product description..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Emoji Icon</label>
      <input type="text" id="p-emoji" class="form-input" placeholder="e.g. 💍">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Status</label>
        <select id="p-status" class="form-input">
          <option value="available">Available</option>
          <option value="sold">Sold</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Featured</label>
        <select id="p-featured" class="form-input">
          <option value="false">No</option>
          <option value="true">Yes</option>
        </select>
      </div>
    </div>
    <div id="form-err" class="form-error" style="display:none;margin-bottom:12px;"></div>
    <button class="btn-gold" style="width:100%; margin-top:8px;" id="save-product-btn">Save Product</button>
  </div>
</div>

<script src="../js/data.js"></script>
<script>
let _productsCache = [];

document.addEventListener('DOMContentLoaded', async () => {
  const session = getSession();
  if (!session || session.role !== 'admin') { window.location.href = '../login.html'; return; }
  document.getElementById('logout-btn').addEventListener('click', async (e) => { e.preventDefault(); await logout(); window.location.href = '../login.html'; });

  await renderTable();

  document.getElementById('add-product-btn').addEventListener('click', openAddModal);
  document.getElementById('modal-close-btn').addEventListener('click', closeModal);
  document.getElementById('product-form-modal').addEventListener('click', (e) => { if (e.target === document.getElementById('product-form-modal')) closeModal(); });
  document.getElementById('save-product-btn').addEventListener('click', handleSaveProduct);
  document.getElementById('product-search').addEventListener('input', () => filterAndDisplay());
});

async function renderTable() {
  _productsCache = await getProducts();
  filterAndDisplay();
}

function filterAndDisplay() {
  const query = document.getElementById('product-search')?.value.toLowerCase() || '';
  let products = _productsCache;
  if (query) products = products.filter(p =>
    (p.product_name || '').toLowerCase().includes(query) ||
    (p.product_origin || '').toLowerCase().includes(query) ||
    (p.product_type || '').toLowerCase().includes(query)
  );
  document.getElementById('product-count').textContent = `(${products.length})`;
  const poa = p => p.product_price_poa == 1;
  const priceDisplay = p => poa(p) ? 'POA' : (p.product_price ? `₱ ${Number(p.product_price).toLocaleString()}` : '—');
  document.getElementById('products-table').innerHTML = products.length
    ? products.map(p => `<tr>
        <td><strong style="color:var(--white);">${p.product_emoji || '💍'} ${p.product_name}</strong></td>
        <td style="text-transform:capitalize;">${p.product_type}</td>
        <td>${p.product_origin}</td>
        <td>${p.product_karat || '—'}</td>
        <td>${priceDisplay(p)}</td>
        <td><span class="badge-status badge-${p.product_status}">${p.product_status}</span></td>
        <td>
          <button class="action-btn action-edit" onclick="openEditModal(${p.product_id})">Edit</button>
          <button class="action-btn action-delete" onclick="handleDeleteProduct(${p.product_id})" style="margin-left:4px;">Delete</button>
        </td>
      </tr>`).join('')
    : `<tr><td colspan="7" style="text-align:center;color:var(--gray-light);padding:32px;">No products found</td></tr>`;
}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Add Product';
  document.getElementById('edit-id').value = '';
  ['p-name','p-karat','p-weight','p-materials','p-price','p-description','p-emoji'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-type').value = 'ring';
  document.getElementById('p-origin').value = 'Japan';
  document.getElementById('p-status').value = 'available';
  document.getElementById('p-featured').value = 'false';
  document.getElementById('form-err').style.display = 'none';
  document.getElementById('product-form-modal').classList.add('open');
}

function openEditModal(id) {
  const p = _productsCache.find(x => x.product_id == id);
  if (!p) return;
  document.getElementById('modal-title').textContent = 'Edit Product';
  document.getElementById('edit-id').value = p.product_id;
  document.getElementById('p-name').value = p.product_name || '';
  document.getElementById('p-type').value = p.product_type || 'ring';
  document.getElementById('p-origin').value = p.product_origin || 'Japan';
  document.getElementById('p-karat').value = p.product_karat || '';
  document.getElementById('p-weight').value = p.product_weight || '';
  document.getElementById('p-materials').value = p.product_materials || '';
  document.getElementById('p-price').value = p.product_price_poa == 1 ? 'POA' : (p.product_price || '');
  document.getElementById('p-description').value = p.product_description || '';
  document.getElementById('p-emoji').value = p.product_emoji || '';
  document.getElementById('p-status').value = p.product_status || 'available';
  document.getElementById('p-featured').value = p.product_featured == 1 ? 'true' : 'false';
  document.getElementById('form-err').style.display = 'none';
  document.getElementById('product-form-modal').classList.add('open');
}

function closeModal() { document.getElementById('product-form-modal').classList.remove('open'); }

async function handleSaveProduct() {
  const errEl = document.getElementById('form-err');
  const name = document.getElementById('p-name').value.trim();
  if (!name) { errEl.textContent = 'Product name is required.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const editId = document.getElementById('edit-id').value;
  const priceRaw = document.getElementById('p-price').value.trim();
  const isPoa = !priceRaw || priceRaw.toUpperCase() === 'POA';

  const productData = {
    product_name: name,
    product_type: document.getElementById('p-type').value,
    product_origin: document.getElementById('p-origin').value,
    product_karat: document.getElementById('p-karat').value,
    product_weight: document.getElementById('p-weight').value,
    product_materials: document.getElementById('p-materials').value,
    product_price: isPoa ? null : parseFloat(priceRaw.replace(/[₱,\s]/g, '')) || 0,
    product_price_poa: isPoa ? 1 : 0,
    product_description: document.getElementById('p-description').value,
    product_emoji: document.getElementById('p-emoji').value || '💍',
    product_status: document.getElementById('p-status').value,
    product_featured: document.getElementById('p-featured').value === 'true' ? 1 : 0
  };

  const btn = document.getElementById('save-product-btn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  let result;
  if (editId) {
    productData.product_id = parseInt(editId);
    result = await updateProduct(productData);
  } else {
    result = await addProduct(productData);
  }

  btn.disabled = false;
  btn.textContent = 'Save Product';

  if (result && result.success) {
    closeModal();
    await renderTable();
    showToast(editId ? 'Product updated!' : 'Product added!');
  } else {
    errEl.textContent = result?.message || 'Failed to save product. Please try again.';
    errEl.style.display = 'block';
  }
}

async function handleDeleteProduct(id) {
  if (!confirm('Are you sure you want to delete this product?')) return;
  const result = await deleteProduct(id);
  if (result && result.success) {
    await renderTable();
    showToast('Product deleted.');
  } else {
    showToast(result?.message || 'Failed to delete product.');
  }
}
</script>
</body>
</html>
